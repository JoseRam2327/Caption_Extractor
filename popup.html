<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #bf5700 0%, #d97706 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }

    .header h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #extractBtn {
      background: #bf5700;
      color: white;
    }

    #extractBtn:hover {
      background: #a34900;
    }

    #extractBtn:active {
      transform: scale(0.98);
    }

    #copyBtn {
      background: #4b5563;
      color: white;
    }

    #copyBtn:hover {
      background: #3a4450;
    }

    #downloadBtn {
      background: #2d5016;
      color: white;
    }

    #downloadBtn:hover {
      background: #1f3810;
    }

    #clearBtn {
      background: #dc2626;
      color: white;
    }

    #clearBtn:hover {
      background: #b91c1c;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    textarea {
      width: 100%;
      height: 250px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: "Monaco", "Courier New", monospace;
      font-size: 12px;
      resize: vertical;
      line-height: 1.5;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .status.error {
      background: #fee2e2;
      color: #7f1d1d;
      display: block;
    }

    .status.info {
      background: #dbeafe;
      color: #0c2340;
      display: block;
    }

    .stats {
      padding: 10px;
      background: #f9fafb;
      border-radius: 6px;
      font-size: 12px;
      color: #4b5563;
    }

    .stats strong {
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>📝 Caption Extractor</h2>
    <p>Extract captions from UT Austin Tower videos</p>
  </div>

  <div class="container">
    <div class="button-group">
      <button id="extractBtn">Extract Captions</button>
      <button id="copyBtn">Copy</button>
    </div>

    <div class="button-group">
      <button id="downloadBtn">Download TXT</button>
      <button id="clearBtn">Clear</button>
    </div>

    <textarea id="captionText" placeholder="Captions will appear here..."></textarea>

    <div id="status" class="status"></div>

    <div class="stats">
      <div>📊 Captions: <strong id="captionCount">0</strong></div>
      <div>⏱️ Duration: <strong id="captionDuration">0:00</strong></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
